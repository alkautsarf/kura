name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-download-url: ${{ matrix.target == 'darwin-arm64' && 'https://github.com/oven-sh/bun/releases/download/bun-v1.3.12/bun-darwin-aarch64.zip' || 'https://github.com/oven-sh/bun/releases/download/bun-v1.3.12/bun-linux-x64.zip' }}

      - run: bun install

      - name: Compile binary
        run: bun build.ts bun-${{ matrix.target }} kura-${{ matrix.target }}

      # bun --compile emits a malformed code signature that macOS 26's stricter
      # mach-o loader rejects with "code signature error 4" → SIGKILL on launch.
      # Strip and re-sign adhoc so the binary loads on Tahoe.
      - name: Fix bun --compile code signature (macOS)
        if: contains(matrix.target, 'darwin')
        run: |
          codesign --remove-signature kura-${{ matrix.target }} || true
          codesign --force --sign - kura-${{ matrix.target }}

      # Build the Swift Touch ID signer alongside kura on macOS. macos-14 runners
      # ship Swift pre-installed. LAContext is Apple-only, so this step skips on
      # Linux. The brew formula installs both binaries to /opt/homebrew/bin so
      # findSignerBinary() in src/core/keychain.ts resolves it from any cwd.
      - name: Build kura-signer (macOS only)
        if: contains(matrix.target, 'darwin')
        run: |
          cd swift && swift build -c release
          cp .build/release/kura-signer ../kura-signer
          cd ..
          codesign --remove-signature kura-signer || true
          codesign --force --sign - kura-signer

      - name: Create tarball
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            tar -czf kura-${TAG}-${{ matrix.target }}.tar.gz kura-${{ matrix.target }} kura-signer
          else
            tar -czf kura-${TAG}-${{ matrix.target }}.tar.gz kura-${{ matrix.target }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kura-${{ matrix.target }}
          path: kura-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
